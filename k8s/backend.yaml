apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: expense-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: pawanpatil2108/expense-backend:v1
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: "mongodb://mongo:27017/expense-tracker"
            - name: JWT_SECRET
              value: "mysecretkey"
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: expense-app
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
